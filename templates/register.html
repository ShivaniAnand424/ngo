{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center py-10">
    <div class="bg-white p-8 rounded-xl shadow-xl border-t-8 border-orange-600 w-full max-w-lg">
        <div class="text-center mb-6">
            <h2 class="text-3xl font-bold text-gray-800">Join the Foundation</h2>
            <p class="text-gray-500 mt-2">Help us serve our senior community</p>
        </div>

        <form action="/register" method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="md:col-span-2">
                <label class="block text-sm font-semibold text-gray-700">Full Name</label>
                <input type="text" name="full_name" required class="w-full mt-1 p-3 border border-gray-300 rounded-lg focus:ring-orange-500" placeholder="e.g. Rahul Sharma">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Email</label>
                <input type="email" name="email" required class="w-full mt-1 p-3 border border-gray-300 rounded-lg focus:ring-orange-500" placeholder="email@example.com">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Phone</label>
                <input type="text" name="phone" required class="w-full mt-1 p-3 border border-gray-300 rounded-lg focus:ring-orange-500" placeholder="Mobile Number">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Password</label>
                <input type="password" name="password" required class="w-full mt-1 p-3 border border-gray-300 rounded-lg focus:ring-orange-500">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700">Register As</label>
                <select name="role" class="w-full mt-1 p-3 border border-gray-300 rounded-lg focus:ring-orange-500 bg-white">
                    <option value="senior">Senior Citizen</option>
                    <option value="donor">Donor</option>
                    <option value="volunteer">Volunteer</option>
                </select>
            </div>

            <div class="md:col-span-2 mt-4">
                <button type="submit" 
                    class="w-full bg-orange-600 text-white font-bold py-3 rounded-lg hover:bg-orange-700 shadow-lg">
                    Create Account
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
